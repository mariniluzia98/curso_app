version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edulumina-web
    ports:
      - "80:80"
    volumes:
      # Hot reload: bind mount for development
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./index.html
          target: /usr/share/nginx/html/index.html
        - action: sync
          path: ./css
          target: /usr/share/nginx/html/css
        - action: sync
          path: ./js
          target: /usr/share/nginx/html/js
        - action: sync
          path: ./nginx.conf
          target: /etc/nginx/conf.d/default.conf
