version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edulumina-web
    ports:
      - "80:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./
          target: /app
